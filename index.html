<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>Rain</title>
	<style>
		body {
			margin: 0;
			background-color: black,
			background-position: 0px 0px,
			16px 16px;
			background-size: 32px 32px;
			background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee 100%),
			linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee 100%);
		}

		#root {
			position: absolute;
			width: 100vw;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		#canvas {
			width: 100%;
			height: 100%;
		}

		#loading {
			position: absolute;
			z-index: -1;
			font-family: 'Segoe UI', Roboto, Tahoma, Geneva, Verdana, sans-serif;
			font-size: 2em;
			color: gray;
		}


		section
		{
			position: relative;
			width: 100%;
			height:100vh;
			overflow: hidden;
		}
		section img
		{
			width: 100%;
		}


		/*  */

		.iframeContainer{
			z-index: 1000;
			position:absolute;
			width: 100%;
			height:fit-content;
			overflow:hidden;
			border: none;
			/* margin-top: -50%; */

		}

		.iframeContent{
			margin:5% 15%;
			position: relative;
			top:0%;
			left:0%;
			width:70%;
			height:37.5rem;
			border-radius: 2%;
			border-style:groove;
			border-color:black;
		}

		.credit
		{
			z-index: 2000;
			position:absolute;
			bottom:2%;
			left:45%;
			/* we could also use
			margin-left: 0px;
			margin-top: 0px;
			margin-right: 0px;
			margin-bottom: 0px;
			*/
			text-align: center; /* centers everything that
			doesn't have a width specified */
			font-family: 'Space Grotesk', sans-serif;
			color:#40514E;
			font-size: 0.8rem;
			/* background-color: white; */
			overflow:hidden;
		}

		a
		{
			color:#39A9CB;
			font-family: 'Space Grotesk', sans-serif;
		}



		@media (max-width:600px){
			.iframeContainer{
				
				
				width: 100%;
				height:fit-content;
				overflow:hidden;
				border: none;
				/* margin-top: -50%; */
			
			}
			.iframeContent{
				border-radius: 4%;
				margin:25% 5%;
				position: relative;
				top:0%;
				left:0%;
				width:90%;
				height:30rem;
			}
			.credit
			{
				z-index: 2000;
				position:absolute;
				bottom:4%;
				left:35%;
				text-align: center;
			}

		}
	</style>

<body>
    <section>
	<div class="iframeContainer">
	  	<div id="controlPanel">
	    		<input type="text" id="backgroundURL" placeholder="Enter background URL" value="https://i.imgur.com/AfBMxZ9.png" size="50">
			<input type="number" id="mistBlurStepInput" value="4" maxlength="1" size="1" style="width: 2em;">
	    		<button id="startButton">Start Rain</button>
	    		<button id="fullScreenButton">Full Screen</button>
	  	</div>
	  	<div id="root">
	    		<canvas id="canvas" width="2048" height="2048"></canvas>
	 	</div>
	</div>	
    </section>
	
	<script>
	const canvas = document.querySelector("#canvas");
	const rect = canvas.getBoundingClientRect();
	canvas.width = rect.width;
	canvas.height = rect.height;

	let raindropFx;

	document.getElementById("startButton").addEventListener("click", () => {
  	const backgroundURL = document.getElementById("backgroundURL").value;
	const mistBlurStep = parseInt(document.getElementById("mistBlurStepInput").value);
  	if (!backgroundURL) {
  	  	alert("Please enter a background URL.");
   	return;
  	}
	if (raindropFx) {
    		raindropFx.stop(); // Stop the previous animation if it's running
  	}
  	raindropFx = new RaindropFX({
    	canvas: canvas,
    	background: backgroundURL,
    	mistBlurStep: mistBlurStep,
  	});

  	raindropFx.start(); // Start the raindrop effect
	});

	window.onresize = () => {
  		const rect = canvas.getBoundingClientRect();
  		if (raindropFx) {
    			raindropFx.resize(rect.width, rect.height);
  		}
	};

	// Hidden 
	const controlPanel = document.getElementById('controlPanel');
	let hidePanelTimer;
	document.addEventListener('mousemove', showControlPanel);
	function showControlPanel() {
	  	controlPanel.style.display = 'block';
	  	clearTimeout(hidePanelTimer);
	 	hidePanelTimer = setTimeout(function() {
	    		controlPanel.style.display = 'none';
	  	}, 5000);
	}

	// Full screen
	const fullScreenButton = document.getElementById('fullScreenButton');
	fullScreenButton.addEventListener('click', toggleFullScreen);
	function toggleFullScreen() {
	  if (!document.fullscreenElement) {
	    document.documentElement.requestFullscreen();
	  } else {
	    if (document.exitFullscreen) {
	      document.exitFullscreen();
	    }
	  }
	}
	</script>
</body>
</html>
